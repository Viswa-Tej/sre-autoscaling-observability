apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-app
  namespace: sre-app
  labels:
    app: sre-app
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sre-app
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: sre-app
          # GitHub Actions replaces PLACEHOLDER with real image tag
          image: europe-west1-docker.pkg.dev/sre-autoscaling-project/sre-autoscaling-app/sre-app:latest
          ports:
            - containerPort: 5000
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          env:
            - name: ENVIRONMENT
              value: "production"
      terminationGracePeriodSeconds: 30
